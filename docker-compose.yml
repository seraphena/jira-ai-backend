version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: jira_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secure_password
      POSTGRES_DB: jira_ai_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: jira_ai_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: